apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibe-claude
  namespace: vibe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibe-claude
  template:
    metadata:
      labels:
        app: vibe-claude
    spec:
      containers:
        - name: claude
          image: git.gobau.dev/k00432/vibe-claude:latest
          ports:
            - containerPort: 8081
          env:
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vibe-secrets
                  key: claude-oauth-token
          volumeMounts:
            - name: claude-home
              mountPath: /home/coder
            - name: ui-source
              mountPath: /workspace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: claude-home
          persistentVolumeClaim:
            claimName: vibe-claude-home
        - name: ui-source
          persistentVolumeClaim:
            claimName: vibe-ui-source
