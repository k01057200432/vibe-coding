apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vibe
  namespace: vibe
spec:
  parentRefs:
    - name: gobau-internal-gateway
      namespace: envoy-gateway
  hostnames:
    - vibe.gobau.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /claude
      backendRefs:
        - name: vibe-claude
          port: 8081
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vibe-ui
          port: 3000
