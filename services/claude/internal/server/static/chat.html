<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Claude Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Symbols+2&display=swap">
<style>
@font-face {
  font-family: 'D2CodingNerd';
  src: url('fonts/D2CodingLigatureNerdFontMono-Regular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
:root {
  --bg-base:     #0A0A0F;
  --bg-surface:  #12121A;
  --bg-elevated: #1A1A25;
  --bg-overlay:  #22222E;
  --border-subtle:   #1E1E2A;
  --border-default:  #2A2A38;
  --border-emphasis: #363648;
  --text-primary:   #F0F0F5;
  --text-secondary: #A0A0B0;
  --text-muted:     #606070;
  --text-dim:       #404050;
  --accent:  #6366F1;
  --accent-bright: #818CF8;
  --accent-glow: rgba(99, 102, 241, 0.12);
  --accent-blue: #3B82F6;
  --accent-red: #EF4444;
  --profit: #22C55E;
  --warning: #F59E0B;
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow: hidden; height: 100%; }
html { touch-action: manipulation; }

/* Dark theme scrollbar */
* {
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.2) transparent;
}
*::-webkit-scrollbar { width: 6px; height: 6px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
*::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.35); }

body {
  background: var(--bg-base);
  font-family: var(--font-sans);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* Session tabs bar */
.session-tabs {
  display: flex; align-items: stretch;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
  min-height: 2rem;
  overflow-x: auto;
  scrollbar-width: none;
}
.session-tabs::-webkit-scrollbar { display: none; }

.session-tab {
  display: flex; align-items: center; gap: 0.35rem;
  padding: 0.3rem 0.75rem; cursor: pointer;
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  color: var(--text-muted); background: transparent; border: none;
  border-bottom: 2px solid transparent;
  white-space: nowrap; transition: all 0.15s;
  flex-shrink: 0;
}
.session-tab:hover { color: var(--text-secondary); background: var(--bg-overlay); }
.session-tab.active {
  color: var(--text-primary);
  border-bottom-color: var(--accent);
  background: var(--bg-surface);
}
.session-tab .tab-mode {
  font-size: 8px; font-weight: 600; text-transform: uppercase;
  padding: 0 4px; border-radius: 2px; letter-spacing: 0.03em;
}
.session-tab .tab-mode.admin { color: var(--accent); background: var(--accent-glow); }
.session-tab .tab-mode.shell { color: var(--text-muted); background: rgba(96,96,112,0.12); }

.session-tab .tab-close {
  display: inline-flex; align-items: center; justify-content: center;
  width: 14px; height: 14px; border-radius: 3px;
  color: var(--text-dim); background: transparent; border: none;
  cursor: pointer; font-size: 10px; line-height: 1;
  opacity: 0; transition: opacity 0.1s;
}
.session-tab:hover .tab-close { opacity: 1; }
.session-tab .tab-close:hover { background: rgba(239,68,68,0.15); color: var(--accent-red); }

.tab-new {
  display: flex; align-items: center; justify-content: center;
  padding: 0.3rem 0.5rem; cursor: pointer;
  color: var(--text-dim); background: transparent; border: none;
  flex-shrink: 0; transition: all 0.15s;
}
.tab-new:hover { color: var(--text-secondary); background: var(--bg-overlay); }

.tab-spacer { flex: 1; }

/* Status area (right side of tab bar) */
.tab-status {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0 0.75rem; flex-shrink: 0;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-dim); flex-shrink: 0;
}
.status-dot.connected { background: var(--profit); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.status-dot.connecting { background: var(--warning); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.status-label {
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  color: var(--text-dim);
}

/* Terminal area */
.terminal-wrap {
  flex: 1; min-height: 0;
  background: var(--bg-base);
  padding-bottom: 4rem;
}
.terminal-wrap .xterm { padding: 4px; }
.terminal-wrap .xterm-viewport { overflow-y: auto !important; }

/* Empty state — mode selection */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 1rem;
  min-height: 0; overflow-y: auto;
  scrollbar-width: none;
}
.empty-state::-webkit-scrollbar { display: none; }
.empty-state::before, .empty-state::after {
  content: ''; flex: 1 0 0.5rem;
}
.empty-title {
  font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
  -webkit-user-select: none; user-select: none; cursor: default;
}
.empty-desc {
  font-size: 0.7rem; color: var(--text-muted);
  -webkit-user-select: none; user-select: none;
}
.mode-cards {
  display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
}
.mode-card {
  display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
  padding: 0.75rem 1.25rem; border-radius: var(--radius-sm);
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  cursor: pointer; transition: all 0.15s; width: 110px;
  font-family: var(--font-sans); color: var(--text-secondary);
  -webkit-user-select: none; user-select: none;
}
.mode-card:hover { border-color: var(--border-emphasis); background: var(--bg-elevated); }
.mode-card-label { font-size: 0.7rem; font-weight: 600; }
.mode-card-desc { font-size: 0.6rem; color: var(--text-muted); }
.mode-card.admin:hover { border-color: rgba(99,102,241,0.4); }
.mode-card.admin .mode-card-label { color: var(--accent); }
.mode-card.shell:hover { border-color: var(--border-emphasis); }

/* Mobile keybar */
.mobile-keybar {
  display: none;
  flex-direction: column;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-elevated);
  border-top: 1px solid var(--border-subtle);
  padding: 4px 6px; gap: 3px;
  z-index: 100;
}
.mk-row {
  display: flex; gap: 3px; width: 100%;
  align-items: center; justify-content: center;
}
.mk-btn {
  flex: 1 1 0; min-width: 0;
  height: 2rem; line-height: 2rem;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  padding: 0 2px; border-radius: 4px;
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  color: var(--text-muted); cursor: pointer; transition: all 0.1s;
  -webkit-tap-highlight-color: transparent; text-align: center;
  box-sizing: border-box;
}
.mk-btn:active { background: var(--bg-overlay); }
.mk-btn.mk-active {
  background: var(--accent-glow); border-color: var(--accent); color: var(--accent);
}
.mk-arrow { font-size: 13px; }

@media (pointer: coarse) {
  .mobile-keybar { display: flex; }
}
@media (max-width: 768px) {
  input, textarea, select { font-size: 16px !important; }
}
</style>
</head>
<body>

<!-- Session tab bar -->
<div class="session-tabs" id="session-tabs">
  <div id="tabs-container" style="display:flex;align-items:stretch;overflow-x:auto"></div>
  <button class="tab-new" id="btn-new" onclick="goToModeSelect()" title="새 세션">
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
  </button>
  <span class="tab-spacer"></span>
  <div class="tab-status">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-label" id="status-label"></span>
  </div>
</div>

<!-- Empty state -->
<div class="empty-state" id="empty-state">
  <p class="empty-title">Claude Terminal</p>
  <p class="empty-desc">세션 모드를 선택하세요</p>

  <!-- Resume mode -->
  <div style="display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center">
    <button class="mode-card" style="border-color:var(--border-default)" onclick="createSession('admin','continue')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 9.563C9 9.252 9.252 9 9.563 9h4.874c.311 0 .563.252.563.563v4.874c0 .311-.252.563-.563.563H9.564A.562.562 0 019 14.437V9.564z"/></svg>
      <span class="mode-card-label" style="color:var(--accent-bright)">이어서</span>
      <span class="mode-card-desc">마지막 대화 계속</span>
    </button>
    <button class="mode-card" style="border-color:var(--border-default)" onclick="createSession('admin','resume')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm0 5.25h.007v.008H3.75V12zm0 5.25h.007v.008H3.75v-.008z"/></svg>
      <span class="mode-card-label" style="color:var(--accent-bright)">목록</span>
      <span class="mode-card-desc">세션 선택 재개</span>
    </button>
  </div>

  <!-- Session mode cards -->
  <div class="mode-cards" style="margin-top:0.25rem">
    <button class="mode-card admin" onclick="createSession('admin')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/></svg>
      <span class="mode-card-label">Admin</span>
      <span class="mode-card-desc">풀 권한 실행</span>
    </button>
    <button class="mode-card shell" onclick="createSession('shell')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3"/></svg>
      <span class="mode-card-label">Shell</span>
      <span class="mode-card-desc">직접 터미널</span>
    </button>
  </div>
</div>

<!-- Terminal (hidden until session connected) -->
<div class="terminal-wrap" id="terminal-box" style="display:none"></div>

<!-- Mobile keybar -->
<div class="mobile-keybar" id="mobile-keybar" style="display:none">
  <div class="mk-row">
    <button class="mk-btn" data-mod="esc">ESC</button>
    <button class="mk-btn" data-mod="ctrl">CTRL</button>
    <button class="mk-btn" data-mod="alt">ALT</button>
    <button class="mk-btn" data-mod="tab">TAB</button>
    <button class="mk-btn" data-mod="prefix">Ctrl+B</button>
    <button class="mk-btn" data-key="Enter">Enter</button>
  </div>
  <div class="mk-row">
    <button class="mk-btn" data-key="PageUp">PgUp</button>
    <button class="mk-btn" data-key="PageDown">PgDn</button>
    <button class="mk-btn" data-key="Home">Home</button>
    <button class="mk-btn" data-key="End">End</button>
    <button class="mk-btn mk-arrow" data-key="ArrowLeft">&larr;</button>
    <button class="mk-btn mk-arrow" data-key="ArrowUp">&uarr;</button>
    <button class="mk-btn mk-arrow" data-key="ArrowDown">&darr;</button>
    <button class="mk-btn mk-arrow" data-key="ArrowRight">&rarr;</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
(function() {
    var BASE = location.pathname.replace(/\/chat\/?$/, '').replace(/\/+$/, '') || '';
    var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    var THEME = {
        background: '#0A0A0F', foreground: '#F0F0F5',
        cursor: '#6366F1', cursorAccent: '#0A0A0F',
        selectionBackground: 'rgba(99,102,241,0.2)',
        black: '#0A0A0F', red: '#f87171', green: '#22C55E', yellow: '#f59e0b',
        blue: '#60a5fa', magenta: '#c084fc', cyan: '#22d3ee', white: '#F0F0F5',
        brightBlack: '#606070', brightRed: '#fca5a5', brightGreen: '#4ade80',
        brightYellow: '#fbbf24', brightBlue: '#93c5fd', brightMagenta: '#d8b4fe',
        brightCyan: '#67e8f9', brightWhite: '#ffffff'
    };

    // --- State ---
    // sessions: [{id, mode, status}]
    var sessions = [];
    var activeSessionId = null;
    var term = null, fit = null, ws = null;
    var intentionalClose = false;
    var reconnectAttempts = 0, maxReconnects = 10, reconnectTimer = null;

    // --- UI helpers ---
    function setStatus(state, text) {
        var dot = document.getElementById('status-dot');
        var label = document.getElementById('status-label');
        dot.className = 'status-dot' + (state === 'connected' ? ' connected' : state === 'connecting' ? ' connecting' : '');
        label.textContent = text || '';
        label.style.color = state === 'connected' ? 'var(--profit)' : state === 'connecting' ? 'var(--warning)' : 'var(--text-dim)';
    }

    function renderTabs() {
        var container = document.getElementById('tabs-container');
        container.innerHTML = '';
        sessions.forEach(function(s) {
            var tab = document.createElement('button');
            tab.className = 'session-tab' + (s.id === activeSessionId ? ' active' : '');
            tab.onclick = function(e) {
                if (e.target.closest('.tab-close')) return;
                switchSession(s.id);
            };

            var modeSpan = document.createElement('span');
            modeSpan.className = 'tab-mode ' + s.mode;
            modeSpan.textContent = s.mode === 'admin' ? 'ADMIN' : 'SHELL';
            tab.appendChild(modeSpan);

            var nameSpan = document.createElement('span');
            nameSpan.textContent = s.current_command || s.name || s.id.substring(0, 8);
            tab.appendChild(nameSpan);

            var closeBtn = document.createElement('button');
            closeBtn.className = 'tab-close';
            closeBtn.innerHTML = '&times;';
            closeBtn.title = '세션 종료';
            closeBtn.onclick = function(e) {
                e.stopPropagation();
                killSession(s.id);
            };
            tab.appendChild(closeBtn);

            container.appendChild(tab);
        });
    }

    function notifyParent(hasSession) {
        if (window.parent === window) return;
        window.parent.postMessage({ type: 'claude-terminal-state', hasSession: hasSession }, '*');
    }

    function showTerminal() {
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('terminal-box').style.display = '';
        document.getElementById('mobile-keybar').style.removeProperty('display');
        notifyParent(true);
    }

    function showModeSelect() {
        document.getElementById('empty-state').style.display = '';
        document.getElementById('terminal-box').style.display = 'none';
        document.getElementById('mobile-keybar').style.display = 'none';
        setStatus('idle', '');
        notifyParent(false);
    }

    function goToModeSelect() {
        // Disconnect from current session (don't kill it)
        if (ws) { intentionalClose = true; ws.close(); ws = null; }
        stopReconnect();
        activeSessionId = null;
        if (term) { term.dispose(); term = null; fit = null; }
        document.getElementById('terminal-box').innerHTML = '';
        renderTabs();
        showModeSelect();
    }
    window.goToModeSelect = goToModeSelect;

    // --- Terminal ---
    var TERM_FONT = "'D2CodingNerd', 'Noto Sans Symbols 2', 'JetBrains Mono', monospace";

    function initTerm() {
        if (term) { term.dispose(); term = null; fit = null; }
        document.getElementById('terminal-box').innerHTML = '';
        var el = document.getElementById('terminal-box');
        term = new Terminal({
            theme: THEME,
            fontFamily: TERM_FONT,
            fontSize: isMobile ? 11 : 13,
            lineHeight: 1.35,
            cursorBlink: true, cursorStyle: 'bar',
            scrollback: isMobile ? 5000 : 10000,
            convertEol: true,
        });
        fit = new FitAddon.FitAddon();
        term.loadAddon(fit);
        term.open(el);
        fit.fit();

        term.attachCustomKeyEventHandler(function(e) {
            if (e.ctrlKey && !e.altKey && !e.metaKey) {
                var k = e.key.toLowerCase();
                var block = ['w','t','n','q','l','tab','+','-','=','0','f','p','s','g','h','j','d'];
                if (block.indexOf(k) !== -1 || block.indexOf(e.key) !== -1) { e.preventDefault(); return true; }
            }
            if (e.ctrlKey && (e.key === '`' || e.code === 'Backquote')) return false;
            if (e.altKey && !e.ctrlKey && !e.metaKey) {
                if (e.key === 'Alt') return false;
            }
            return true;
        });

        var inputBuffer = '', inputTimer = null, lastSend = 0, THROTTLE = 30;
        function throttledSend(data) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            var now = Date.now();
            if (now - lastSend >= THROTTLE) {
                ws.send(new TextEncoder().encode(data)); lastSend = now;
            } else {
                inputBuffer += data;
                if (!inputTimer) {
                    inputTimer = setTimeout(function() {
                        if (inputBuffer && ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(new TextEncoder().encode(inputBuffer)); lastSend = Date.now();
                        }
                        inputBuffer = ''; inputTimer = null;
                    }, THROTTLE);
                }
            }
        }

        term.onData(function(data) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            if (isMobile && (pendingMod.ctrl || pendingMod.alt) && data.length === 1) {
                var code = data.charCodeAt(0);
                if (pendingMod.ctrl) {
                    if (code >= 97 && code <= 122) sendKey(String.fromCharCode(code - 96));
                    else if (code >= 65 && code <= 90) sendKey(String.fromCharCode(code - 64));
                    else sendKey(data);
                } else if (pendingMod.alt) {
                    sendKey('\x1b' + data);
                }
                clearMods();
                return;
            }
            throttledSend(data);
        });
    }

    // --- WebSocket ---
    function stopReconnect() {
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        reconnectAttempts = 0;
    }

    function scheduleReconnect() {
        if (reconnectAttempts >= maxReconnects) {
            if (term) term.write('\r\n\x1b[31m[reconnect failed]\x1b[0m\r\n');
            setStatus('idle', 'disconnected');
            return;
        }
        var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 8000);
        reconnectAttempts++;
        setStatus('connecting', 'reconnecting ' + reconnectAttempts + '/' + maxReconnects);
        reconnectTimer = setTimeout(function() { if (activeSessionId) doConnect(true); }, delay);
    }

    function connectSession(id, mode) {
        stopReconnect();
        if (ws) { intentionalClose = true; ws.close(); ws = null; }
        activeSessionId = id;
        renderTabs();
        showTerminal();
        initTerm();
        doConnect(false);
    }

    function doConnect(isReconnect) {
        if (!isReconnect) setStatus('connecting', 'connecting...');
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(proto + '//' + location.host + BASE + '/ws/session/' + activeSessionId);
        ws.binaryType = 'arraybuffer';

        ws.onopen = function() {
            reconnectAttempts = 0;
            var s = sessions.find(function(x) { return x.id === activeSessionId; });
            setStatus('connected', s ? s.mode : '');
            ws.send(JSON.stringify({type: 'resize', cols: term.cols, rows: term.rows}));
            if (!isReconnect) term.focus();
        };
        ws.onmessage = function(e) {
            if (e.data instanceof ArrayBuffer) term.write(new Uint8Array(e.data));
            else term.write(e.data);
        };
        ws.onclose = function() {
            if (intentionalClose) { intentionalClose = false; return; }
            scheduleReconnect();
        };
        ws.onerror = function() {};
    }

    // --- Session API ---
    function switchSession(id) {
        if (id === activeSessionId) return;
        var s = sessions.find(function(x) { return x.id === id; });
        if (!s) return;
        connectSession(id, s.mode);
    }
    window.switchSession = switchSession;

    function createSession(mode, resume) {
        setStatus('connecting', 'creating...');
        document.getElementById('empty-state').style.display = 'none';
        var body = {name: mode, mode: mode};
        if (resume) body.resume = resume;
        fetch(BASE + '/api/sessions', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        })
        .then(function(r) { return r.json(); })
        .then(function(s) {
            if (s && s.id) {
                sessions.push({id: s.id, name: s.name || mode, mode: mode, status: 'running'});
                connectSession(s.id, mode);
            }
        })
        .catch(function() { setStatus('idle', 'error'); showModeSelect(); });
    }
    window.createSession = createSession;

    function killSession(id) {
        stopReconnect();
        if (id === activeSessionId) {
            if (ws) { intentionalClose = true; ws.close(); ws = null; }
        }
        fetch(BASE + '/api/sessions/' + id, {method: 'DELETE'}).then(function() {
            sessions = sessions.filter(function(s) { return s.id !== id; });
            if (id === activeSessionId) {
                activeSessionId = null;
                if (term) { term.dispose(); term = null; fit = null; }
                document.getElementById('terminal-box').innerHTML = '';
                // Switch to another session or show mode select
                if (sessions.length > 0) {
                    var next = sessions[sessions.length - 1];
                    connectSession(next.id, next.mode);
                } else {
                    renderTabs();
                    showModeSelect();
                }
            } else {
                renderTabs();
            }
        });
    }
    window.killSession = killSession;

    // --- Init: load existing sessions ---
    function init() {
        fetch(BASE + '/api/sessions')
            .then(function(r) { return r.json(); })
            .then(function(list) {
                var running = (list || []).filter(function(s) { return s.status === 'running'; });
                sessions = running.map(function(s) {
                    return {id: s.id, name: s.name || s.mode, mode: s.mode, current_command: s.current_command, status: s.status};
                });
                renderTabs();
                if (running.length > 0) {
                    var last = running[running.length - 1];
                    connectSession(last.id, last.mode);
                }
            })
            .catch(function() {});
    }
    init();

    // --- Poll session list for tab name updates (current_command) ---
    setInterval(function() {
        fetch(BASE + '/api/sessions')
            .then(function(r) { return r.json(); })
            .then(function(list) {
                var running = (list || []).filter(function(s) { return s.status === 'running'; });
                sessions = running.map(function(s) {
                    return {id: s.id, name: s.name || s.mode, mode: s.mode, current_command: s.current_command, status: s.status};
                });
                renderTabs();
            })
            .catch(function() {});
    }, 5000);

    // --- Resize ---
    window.addEventListener('resize', function() {
        if (fit) {
            fit.fit();
            if (ws && ws.readyState === WebSocket.OPEN && term) {
                ws.send(JSON.stringify({type: 'resize', cols: term.cols, rows: term.rows}));
            }
        }
    });

    // --- Mobile keybar ---
    var pendingMod = { ctrl: false, alt: false };
    function sendKey(k) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(new TextEncoder().encode(k));
    }
    function clearMods() {
        pendingMod.ctrl = false; pendingMod.alt = false;
        document.querySelectorAll('.mk-btn[data-mod="ctrl"],.mk-btn[data-mod="alt"]').forEach(function(b) { b.classList.remove('mk-active'); });
    }
    var ARROW = { ArrowUp: '\x1b[A', ArrowDown: '\x1b[B', ArrowRight: '\x1b[C', ArrowLeft: '\x1b[D' };
    var NAV = { PageUp: '\x1b[5~', PageDown: '\x1b[6~', Home: '\x1b[H', End: '\x1b[F', Enter: '\r' };

    document.getElementById('mobile-keybar').addEventListener('click', function(e) {
        var btn = e.target.closest('.mk-btn');
        if (!btn) return;
        e.preventDefault();
        var mod = btn.dataset.mod, key = btn.dataset.key;
        if (mod === 'esc') { sendKey('\x1b'); clearMods(); }
        else if (mod === 'tab') { sendKey('\t'); clearMods(); }
        else if (mod === 'prefix') { sendKey('\x02'); clearMods(); }
        else if (mod === 'ctrl') { pendingMod.ctrl = !pendingMod.ctrl; btn.classList.toggle('mk-active', pendingMod.ctrl); }
        else if (mod === 'alt') { pendingMod.alt = !pendingMod.alt; btn.classList.toggle('mk-active', pendingMod.alt); }
        else if (key && NAV[key]) { sendKey(NAV[key]); clearMods(); }
        else if (key && ARROW[key]) {
            if (pendingMod.ctrl) { var c = key==='ArrowUp'?'A':key==='ArrowDown'?'B':key==='ArrowRight'?'C':'D'; sendKey('\x1b[1;5'+c); }
            else if (pendingMod.alt) { var c = key==='ArrowUp'?'A':key==='ArrowDown'?'B':key==='ArrowRight'?'C':'D'; sendKey('\x1b[1;3'+c); }
            else sendKey(ARROW[key]);
            clearMods();
        }
        if (term) term.focus();
    });

    if (isMobile && window.visualViewport) {
        var keybar = document.getElementById('mobile-keybar');
        var termBox = document.getElementById('terminal-box');
        function repositionKeybar() {
            var vv = window.visualViewport;
            var bottom = window.innerHeight - (vv.offsetTop + vv.height);
            keybar.style.bottom = bottom + 'px';
            termBox.style.marginBottom = (keybar.offsetHeight + bottom) + 'px';
            if (fit) fit.fit();
        }
        window.visualViewport.addEventListener('resize', repositionKeybar);
        window.visualViewport.addEventListener('scroll', repositionKeybar);
    }
})();


</script>
</body>
</html>
