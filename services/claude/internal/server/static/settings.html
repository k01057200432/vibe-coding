<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Claude Settings</title>
<style>
/* ===== Design Tokens (trading-ui globals.css 동일) ===== */
:root {
  --bg-base:     #0A0A0F;
  --bg-surface:  #12121A;
  --bg-elevated: #1A1A25;
  --bg-overlay:  #22222E;

  --border-subtle:   #1E1E2A;
  --border-default:  #2A2A38;
  --border-emphasis: #363648;
  --border-active:   #6366F1;

  --text-primary:   #F0F0F5;
  --text-secondary: #A0A0B0;
  --text-muted:     #606070;
  --text-dim:       #404050;

  --profit:  #22C55E;
  --loss:    #EF4444;
  --warning: #F59E0B;
  --accent:  #6366F1;
  --info:    #3B82F6;

  --accent-glow:      rgba(99, 102, 241, 0.12);
  --accent-bright:    #818CF8;
  --accent-red:       #EF4444;
  --accent-red-glow:  rgba(239, 68, 68, 0.12);
  --accent-blue:      #3B82F6;
  --accent-blue-glow: rgba(59, 130, 246, 0.12);
  --accent-amber:     #F59E0B;
  --accent-amber-glow: rgba(245, 158, 11, 0.12);
  --accent-purple:    #A78BFA;
  --profit-glow:      rgba(34, 197, 94, 0.12);

  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --radius-sm: 6px;
  --radius-lg: 12px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.2), 0 0 1px rgba(0,0,0,0.3);
}

/* ===== Base ===== */
html { touch-action: manipulation; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-base);
  font-family: var(--font-sans);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Dot grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(40,40,60,0.3) 1px, transparent 0);
  background-size: 28px 28px;
  pointer-events: none; z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-emphasis); }

/* ===== Cards ===== */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  box-shadow: var(--shadow-card);
  position: relative;
  transition: border-color 0.15s ease;
}
.card:hover { border-color: var(--border-default); }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem;
  border-radius: var(--radius-sm); font-weight: 500; cursor: pointer;
  transition: all 0.15s ease; border: none; font-family: var(--font-sans);
}
.btn-accent {
  background: var(--accent); color: #fff; font-size: 0.75rem; padding: 0.4rem 0.85rem;
}
.btn-accent:hover { background: var(--accent-bright); }
.btn-outline {
  background: transparent; color: var(--text-secondary);
  border: 1px solid var(--border-default);
  font-size: 0.7rem; padding: 0.3rem 0.75rem;
}
.btn-outline:hover {
  background: var(--bg-overlay); color: var(--text-primary);
  border-color: var(--border-emphasis);
}

/* ===== Section Header ===== */
.section-header {
  font-size: 0.625rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text-dim);
}

/* ===== Page Header ===== */
.page-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
.page-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.125rem; }

/* ===== Mobile ===== */
@media (max-width: 768px) {
  .form-input, input, textarea, select { font-size: 16px !important; }
}
@media (max-width: 480px) {
  .settings-wrap { padding: 1rem !important; }
  .card { padding: 1rem; }
}
</style>
</head>
<body>

<div class="settings-wrap" style="max-width: 640px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 1">
    <!-- Header -->
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; margin-bottom:1.5rem">
        <div>
            <h1 class="page-title">Settings</h1>
            <p class="page-subtitle">Claude Code CLI</p>
        </div>
        <a id="back-link" href="." style="color:var(--text-secondary); text-decoration:none; font-size:0.8rem; display:flex; align-items:center; gap:0.25rem; transition:color 0.15s"
           onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">
            <svg class="w-4 h-4" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
            </svg>
            Chat
        </a>
    </div>

    <!-- Claude Auth -->
    <div class="card" style="display:flex; flex-direction:column; gap:1.25rem">
        <div>
            <p class="section-header" style="margin-bottom:0.25rem">CLAUDE AUTH</p>
            <p style="font-size:0.75rem; color:var(--text-muted)">OAuth Token (DB settings에서 관리)</p>
        </div>
    </div>
</div>

<script>
</script>
</body>
</html>
