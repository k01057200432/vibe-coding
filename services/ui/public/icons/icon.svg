<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#050a12"/>
  <g transform="translate(64, 80)">
    <!-- Candlestick chart bars -->
    <!-- Bar 1 - green (up) -->
    <rect x="40" y="180" width="8" height="120" fill="#10b981" rx="2"/>
    <rect x="24" y="140" width="40" height="200" fill="#10b981" rx="4" opacity="0.7"/>
    <!-- Bar 2 - red (down) -->
    <rect x="120" y="100" width="8" height="140" fill="#ef4444" rx="2"/>
    <rect x="104" y="120" width="40" height="160" fill="#ef4444" rx="4" opacity="0.7"/>
    <!-- Bar 3 - green (up) -->
    <rect x="200" y="80" width="8" height="200" fill="#10b981" rx="2"/>
    <rect x="184" y="60" width="40" height="180" fill="#10b981" rx="4" opacity="0.7"/>
    <!-- Bar 4 - red (down) -->
    <rect x="280" y="120" width="8" height="160" fill="#ef4444" rx="2"/>
    <rect x="264" y="140" width="40" height="140" fill="#ef4444" rx="4" opacity="0.7"/>
    <!-- Bar 5 - green (up) -->
    <rect x="360" y="40" width="8" height="240" fill="#10b981" rx="2"/>
    <rect x="344" y="20" width="40" height="200" fill="#10b981" rx="4" opacity="0.7"/>
  </g>
  <!-- Trend line -->
  <polyline points="88,320 168,260 248,200 328,280 408,160" stroke="#10b981" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
